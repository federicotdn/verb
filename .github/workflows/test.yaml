name: CI
permissions:
  contents: read

on:
  push:
    paths-ignore:
      - '**.md'
      - 'examples/*'
      - 'extra/*'
  pull_request:
  schedule:
    - cron: '0 12 1 * *'

jobs:
  test:
    name: Checks/Tests
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      matrix:
        # Add 'snapshot' to test on Emacs master
        emacs_version:
          - '26.3'
          - '30.1'
        os:
          - ubuntu-latest
          - macos-latest
        exclude:
          - os: macos-latest
            emacs_version: '26.3'
    steps:
      - uses: purcell/setup-emacs@bdc64dc730ae1fcba200bfd52cb1b4cf6159cbe5 # v8.0
        with:
          version: ${{ matrix.emacs_version }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 'stable'
      - name: Setup checks
        if: "!startsWith(matrix.emacs_version, '26')"
        run: 'make setup-check'
      - name: Run checks
        if: "!startsWith(matrix.emacs_version, '26')"
        run: 'make check'
      - name: Run unit tests
        env:
          WAIT_TIME: 3
        run: 'make test'
